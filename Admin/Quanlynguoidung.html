<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Người dùng — ViecJob</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --ink: #0e0e10;
      --ink-2: #4a4a52;
      --ink-3: #9898a6;
      --ink-4: #c8c8d4;
      --rule: #ebebf0;
      --surface: #ffffff;
      --bg: #f7f7f9;
      --violet: #5b21f5;
      --violet-2: #7c4dff;
      --violet-bg: #f0ebff;
      --violet-mid: #c4b0fa;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --amber: #b45309;
      --amber-bg: #fef3c7;
      --red: #dc2626;
      --red-bg: #fee2e2;
      --blue: #1d4ed8;
      --blue-bg: #dbeafe;
      --r: 8px;
      --r-lg: 12px;
      --fs-xs: 11px;
      --fs-sm: 12.5px;
      --fs-base: 13.5px;
      --fs-md: 15px;
      --fs-lg: 18px;
      --fs-xl: 24px;
      --fs-2xl: 32px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: var(--fs-base);
      line-height: 1.5;
      padding: 0;
      margin: 0;
    }

    /* Nội dung chính */
    .content {
      padding: 28px 24px;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: var(--fs-xl);
      font-weight: 600;
      color: var(--ink);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .filter-group {
      flex: 1;
      min-width: 140px;
    }

    .filter-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 6px;
      display: block;
    }

    .filter-select,
    .filter-input {
      width: 100%;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--r);
      font-size: var(--fs-sm);
      font-family: inherit;
      color: var(--ink);
      outline: none;
    }

    .filter-select:focus,
    .filter-input:focus {
      border-color: var(--violet-mid);
    }

    input[type="date"] {
      color-scheme: light;
      cursor: pointer;
    }

    /* Buttons */
    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--r);
      font-size: var(--fs-sm);
      font-weight: 500;
      color: var(--ink-2);
      cursor: pointer;
      font-family: inherit;
    }

    .btn-outline:hover {
      background: var(--bg);
      border-color: var(--ink-4);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--violet);
      border: none;
      border-radius: var(--r);
      font-size: var(--fs-sm);
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-primary:hover {
      background: var(--violet-2);
    }

    /* Table */
    .data-table {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--r-lg);
      overflow-x: auto;
    }

    .data-table table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    .data-table th {
      padding: 12px 16px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ink-3);
      border-bottom: 1px solid var(--rule);
      background: var(--surface);
    }

    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--rule);
      font-size: var(--fs-sm);
      color: var(--ink-2);
      vertical-align: middle;
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table tr:hover {
      background: var(--bg);
      cursor: pointer;
    }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar-img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-name {
      font-weight: 500;
      color: var(--ink);
    }

    .user-title {
      font-size: 11px;
      color: var(--ink-3);
      margin-top: 2px;
    }

    /* Status badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge svg {
      width: 13px;
      height: 13px;
    }

    .status-active {
      background: #eaf3de;
      color: #27500a;
    }

    .status-pending {
      background: #faeeda;
      color: #633806;
    }

    .status-suspended {
      background: #fcebeb;
      color: #791f1f;
    }

    /* Action buttons */
    .action-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 4px 0;
      width: 90px;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      font-family: inherit;
    }

    .action-btn svg {
      width: 13px;
      height: 13px;
    }

    .action-btn-view {
      border: 1.5px solid #afa9ec;
      color: #3c3489;
    }

    .action-btn-view:hover {
      background: #eeedfe;
    }

    .action-btn-block {
      border: 1.5px solid #f09595;
      color: #791f1f;
    }

    .action-btn-block:hover {
      background: #fcebeb;
    }

    .action-btn-restore {
      border: 1.5px solid #85b7eb;
      color: #0c447c;
    }

    .action-btn-restore:hover {
      background: #e6f1fb;
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      border-top: 1px solid var(--rule);
    }

    .pagination-controls {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .pagination-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      border: 1.5px solid transparent;
      background: transparent;
      color: var(--ink-3);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .pagination-btn:hover {
      background: var(--bg);
      color: var(--ink);
      border-color: var(--rule);
    }

    .pagination-btn.active {
      background: #eeedfe;
      color: #3c3489;
      border-color: #afa9ec;
      font-weight: 600;
    }

    .pagination-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .no-data {
      text-align: center;
      padding: 48px;
      color: var(--ink-3);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(3px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-container {
      background: white;
      border-radius: 24px;
      width: 560px;
      max-width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--rule);
    }

    .modal-header h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
    }

    .modal-close {
      cursor: pointer;
      color: var(--ink-3);
    }

    .modal-close:hover {
      color: var(--ink);
    }

    .modal-body {
      padding: 24px;
    }

    .profile-header {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--rule);
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--violet-bg);
    }

    .profile-name h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .profile-name .role {
      color: var(--violet);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .profile-name .joined {
      font-size: 12px;
      color: var(--ink-3);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--rule);
    }

    .info-item label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 4px;
    }

    .info-item .value {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
    }

    .stats-row {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--rule);
    }

    .stat-item {
      flex: 1;
      text-align: center;
      padding: 8px;
      background: var(--bg);
      border-radius: 16px;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--violet);
    }

    .stat-label {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 4px;
    }

    .cv-list {
      margin-bottom: 28px;
    }

    .cv-list h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--ink);
    }

    .cv-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--rule);
    }

    .cv-info .cv-name {
      font-weight: 500;
      font-size: 14px;
      color: var(--ink);
    }

    .cv-info .cv-date {
      font-size: 11px;
      color: var(--ink-3);
      margin-top: 2px;
    }

    .cv-actions {
      display: flex;
      gap: 8px;
    }

    .cv-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .cv-btn-view {
      color: var(--violet);
    }

    .cv-btn-view:hover {
      background: var(--violet-bg);
    }

    .cv-btn-download {
      color: var(--green);
    }

    .cv-btn-download:hover {
      background: #dcfce7;
    }

    .cv-btn-upload {
      color: var(--amber);
      border: 1px solid #fef3c7;
      background: #fef3c7;
    }

    .cv-btn-upload:hover {
      background: #fde68a;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 16px 24px;
      border-top: 1px solid var(--rule);
    }

    .modal-footer .btn-secondary {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    .modal-footer .btn-secondary:hover {
      background: var(--bg);
    }

    .modal-footer .btn-danger {
      padding: 10px 20px;
      background: #fee2e2;
      border: 1px solid #f09595;
      border-radius: 12px;
      color: #791f1f;
      font-weight: 500;
      cursor: pointer;
    }

    .modal-footer .btn-danger:hover {
      background: #fcebeb;
    }

    .modal-footer .btn-primary {
      padding: 10px 20px;
      background: var(--violet);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }

    .modal-footer .btn-primary:hover {
      background: var(--violet-2);
    }
  </style>
</head>

<body>
  <div class="content">
    <div class="page-head">
      <div>
        <h1 class="page-title">Danh sách ứng viên</h1>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-outline" id="exportExcelBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />

            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>Thêm ứng viên</button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-group"><label class="filter-label">Trạng thái</label><select class="filter-select"
          id="statusFilter">
          <option value="">Tất cả</option>
          <option value="active">Đang hoạt động</option>
          <option value="pending">Chờ duyệt</option>
          <option value="suspended">Đã khóa</option>
        </select></div>
      <div class="filter-group"><label class="filter-label">Ngành nghề</label><select class="filter-select"
          id="industryFilter">
          <option value="">Tất cả</option>
          <option value="Thiết kế / UI-UX">Thiết kế / UI-UX</option>
          <option value="Công nghệ thông tin">Công nghệ thông tin</option>
          <option value="Marketing">Marketing</option>
          <option value="Bán hàng">Bán hàng</option>
          <option value="Quản lý dự án">Quản lý dự án</option>
          <option value="Thiết kế">Thiết kế</option>
        </select></div>
      <div class="filter-group" style="flex:2;"><label class="filter-label">Khoảng ngày</label>
        <div style="display:flex;gap:6px;"><input class="filter-input" type="date" id="dateFrom"
            style="flex:1;"><span>—</span><input class="filter-input" type="date" id="dateTo" style="flex:1;"></div>
      </div>
      <button class="btn-outline" id="clearFiltersBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"
          stroke="currentColor">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>Xóa bộ lọc</button>
    </div>

    <div class="data-table">
      <table id="userTable">
        <thead>
          <tr>
            <th>ỨNG VIÊN</th>
            <th>THÔNG TIN LIÊN HỆ</th>
            <th style="text-align:center;">NGÀY ĐK</th>
            <th style="text-align:center;">TRẠNG THÁI</th>
            <th style="text-align:center;">LẦN CUỐI</th>
            <th style="text-align:center;">THAO TÁC</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>
      <div class="pagination">
        <div class="pagination-controls" id="paginationControls"></div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="profileModal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h3>Hồ sơ ứng viên</h3><span class="modal-close" onclick="closeModal()"><span
            class="material-symbols-outlined">close</span></span>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Đóng</button><button
          class="btn-danger" id="modalBlockBtn">Khóa tài khoản</button></div>
    </div>
  </div>

  <script>
    const usersData = [

      { id: 7, name: "Phạm Tuấn", role: "UI/UX Designer", email: "tuan.pham@yahoo.com", phone: "0377 556 789", joinDate: "05/10/2023", status: "suspended", lastLogin: "20/09/2023", location: "Đà Nẵng", industry: "Thiết kế", avatar: "https://i.pinimg.com/736x/28/70/d0/2870d00d5dfc229d52520f45236cc530.jpg", cv: [{ name: "Portfolio_Tuan_2024.pdf", date: "01/10/2023", url: "#" }], applied: 2 },
      { id: 8, name: "Lý Hoàng", role: "DevOps Engineer", email: "hoang.ly@viecjob.vn", phone: "0903 112 334", joinDate: "01/10/2023", status: "active", lastLogin: "1 giờ trước", location: "Hà Nội", industry: "Công nghệ thông tin", avatar: "https://i.pinimg.com/736x/62/e9/52/62e952aa883ee81755bef433b4b6a018.jpg", cv: [{ name: "DevOps_CV.pdf", date: "28/09/2023", url: "#" }], applied: 5 }

    let currentUser = null;
    let currentPage = 1;
    const itemsPerPage = 5;

    function getFilteredUsers() {
      const status = document.getElementById('statusFilter').value;
      const industry = document.getElementById('industryFilter').value;
      const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      return usersData.filter(user => {
        if (status && user.status !== status) return false;
        if (industry && user.industry !== industry) return false;
        if (searchTerm && !user.name.toLowerCase().includes(searchTerm) && !user.email.toLowerCase().includes(searchTerm)) return false;
        if (dateFrom || dateTo) {
          const [day, month, year] = user.joinDate.split('/');
          const userDate = new Date(year, month - 1, day);
          if (dateFrom && new Date(dateFrom) > userDate) return false;
          if (dateTo && new Date(dateTo) < userDate) return false;
        }
        return true;
      });
    }

    function renderTable() {
      const filtered = getFilteredUsers();
      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      const start = (currentPage - 1) * itemsPerPage;
      const paginatedUsers = filtered.slice(start, start + itemsPerPage);
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '';

      if (paginatedUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="no-data">Không có dữ liệu</td></tr>';
        document.getElementById('paginationControls').innerHTML = '';
        return;
      }

      paginatedUsers.forEach(user => {
        let statusHtml = '';
        if (user.status === 'active') statusHtml = '<span class="status-badge status-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Đang hoạt động</span>';
        else if (user.status === 'pending') statusHtml = '<span class="status-badge status-pending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Chờ duyệt</span>';
        else statusHtml = '<span class="status-badge status-suspended"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Đã khóa</span>';

        const blockBtnHtml = user.status === 'suspended'
          ? '<button class="action-btn action-btn-restore" onclick="restoreUser(' + user.id + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>Khôi phục</button>'
          : '<button class="action-btn action-btn-block" onclick="blockUser(' + user.id + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Khóa</button>';

        const row = document.createElement('tr');
        row.innerHTML = `
        <td><div class="user-cell"><img class="user-avatar-img" src="${user.avatar}"><div><div class="user-name">${user.name}</div><div class="user-title">${user.role}</div></div></div></td>
        <td><div>${user.email}</div><div style="font-size:11px;color:var(--ink-3);">${user.phone}</div></td>
        <td style="text-align:center;">${user.joinDate}</td>
        <td style="text-align:center;">${statusHtml}</td>
        <td style="text-align:center;">${user.lastLogin}</td>
        <td style="text-align:center;"><div class="action-buttons"><button class="action-btn action-btn-view" onclick="openModal(${user.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Xem</button>${blockBtnHtml}</div></td>
      `;
        tbody.appendChild(row);
      });

      let pagHtml = '';
      pagHtml += `<button class="pagination-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
      for (let i = 1; i <= Math.min(totalPages, 5); i++) {
        pagHtml += `<button class="pagination-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
      }
      if (totalPages > 5) pagHtml += `<span style="color:var(--ink-3);">...</span><button class="pagination-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
      pagHtml += `<button class="pagination-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}>›</button>`;
      document.getElementById('paginationControls').innerHTML = pagHtml;
    }

    function changePage(page) {
      const filtered = getFilteredUsers();
      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    function openModal(userId) {
      currentUser = usersData.find(u => u.id === userId);
      if (!currentUser) return;
      const modalBody = document.getElementById('modalBody');
      let cvHtml = '';
      if (currentUser.cv.length === 0) {
        cvHtml = `<div class="cv-item"><div class="cv-info"><div class="cv-name">Chưa có hồ sơ</div><div class="cv-date">Ứng viên chưa tải CV</div></div><div class="cv-actions"><button class="cv-btn cv-btn-upload" onclick="alert('📤 Demo: Tải lên CV cho ${currentUser.name}')"><span class="material-symbols-outlined" style="font-size:14px;">upload_file</span>Tải lên</button></div></div>`;
      } else {
        cvHtml = currentUser.cv.map(cv => `
        <div class="cv-item"><div class="cv-info"><div class="cv-name">${cv.name}</div><div class="cv-date">Cập nhật: ${cv.date}</div></div><div class="cv-actions"><button class="cv-btn cv-btn-view" onclick="alert('👁️ Xem trước: ${cv.name}')"><span class="material-symbols-outlined" style="font-size:14px;">visibility</span>Xem trước</button><button class="cv-btn cv-btn-download" onclick="alert('📥 Tải về: ${cv.name}')"><span class="material-symbols-outlined" style="font-size:14px;">download</span>Tải về</button></div></div>
      `).join('');
      }
      modalBody.innerHTML = `
      <div class="profile-header"><img class="profile-avatar" src="${currentUser.avatar}"><div class="profile-name"><h2>${currentUser.name}</h2><div class="role">${currentUser.role}</div><div class="joined"><span class="material-symbols-outlined" style="font-size:14px;">calendar_today</span> Tham gia: ${currentUser.joinDate}</div></div></div>
      <div class="info-grid"><div class="info-item"><label>Email</label><div class="value">${currentUser.email}</div></div><div class="info-item"><label>Số điện thoại</label><div class="value">${currentUser.phone}</div></div><div class="info-item"><label>Ngày đăng ký</label><div class="value">${currentUser.joinDate}</div></div><div class="info-item"><label>Lần cuối đăng nhập</label><div class="value">${currentUser.lastLogin}</div></div><div class="info-item"><label>Địa điểm</label><div class="value">${currentUser.location}</div></div><div class="info-item"><label>Ngành nghề</label><div class="value">${currentUser.industry}</div></div></div>
      <div class="stats-row"><div class="stat-item"><div class="stat-number">${currentUser.cv.length}</div><div class="stat-label">CV</div></div><div class="stat-item"><div class="stat-number">${currentUser.applied}</div><div class="stat-label">Việc đã ứng tuyển</div></div><div class="stat-item"><div class="stat-number">8</div><div class="stat-label">Lịch sử hoạt động</div></div></div>
      <div class="cv-list"><h4>📄 CV (${currentUser.cv.length})</h4>${cvHtml}</div>
    `;
      const blockBtn = document.getElementById('modalBlockBtn');
      if (currentUser.status === 'suspended') { blockBtn.textContent = 'Khôi phục tài khoản'; blockBtn.classList.remove('btn-danger'); blockBtn.classList.add('btn-primary'); }
      else { blockBtn.textContent = 'Khóa tài khoản'; blockBtn.classList.remove('btn-primary'); blockBtn.classList.add('btn-danger'); }
      document.getElementById('profileModal').classList.add('active');
    }

    function closeModal() { document.getElementById('profileModal').classList.remove('active'); }
    function blockUser(id) { let u = usersData.find(u => u.id === id); if (u && u.status !== 'suspended') { u.status = 'suspended'; u.lastLogin = 'Đã khóa'; renderTable(); alert(`🔒 Đã khóa ${u.name}`); } }
    function restoreUser(id) { let u = usersData.find(u => u.id === id); if (u && u.status === 'suspended') { u.status = 'active'; u.lastLogin = 'Vừa khôi phục'; renderTable(); alert(`✅ Đã khôi phục ${u.name}`); } }

    document.getElementById('modalBlockBtn').addEventListener('click', () => { if (currentUser) { currentUser.status === 'suspended' ? restoreUser(currentUser.id) : blockUser(currentUser.id); closeModal(); } });
    document.getElementById('profileModal').addEventListener('click', (e) => { if (e.target === document.getElementById('profileModal')) closeModal(); });

    // Thêm search input listener (vì search input nằm trong admin, nhưng để an toàn)
    const searchInput = document.querySelector('#searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', () => { currentPage = 1; renderTable(); });
    } else {
      // Nếu không có search input trong trang này, tạo một biến toàn cục
      window.searchInputListener = () => { currentPage = 1; renderTable(); };
    }

    document.getElementById('statusFilter').addEventListener('change', () => { currentPage = 1; renderTable(); });
    document.getElementById('industryFilter').addEventListener('change', () => { currentPage = 1; renderTable(); });
    document.getElementById('dateFrom').addEventListener('change', () => { currentPage = 1; renderTable(); });
    document.getElementById('dateTo').addEventListener('change', () => { currentPage = 1; renderTable(); });
    document.getElementById('clearFiltersBtn').addEventListener('click', () => {
      document.getElementById('statusFilter').value = '';
      document.getElementById('industryFilter').value = '';
      if (searchInput) searchInput.value = '';
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      currentPage = 1;
      renderTable();
    });

    // Export to Excel
    document.getElementById('exportExcelBtn').addEventListener('click', () => {
      const filtered = getFilteredUsers();
      if (filtered.length === 0) { alert('Không có dữ liệu để xuất!'); return; }
      const exportData = filtered.map(user => ({
        'Họ tên': user.name,
        'Vai trò': user.role,
        'Email': user.email,
        'Số điện thoại': user.phone,
        'Ngày đăng ký': user.joinDate,
        'Trạng thái': user.status === 'active' ? 'Đang hoạt động' : (user.status === 'pending' ? 'Chờ duyệt' : 'Đã khóa'),
        'Lần cuối đăng nhập': user.lastLogin,
        'Địa điểm': user.location,
        'Ngành nghề': user.industry,
        'Số CV': user.cv.length,
        'Số việc đã ứng tuyển': user.applied
      }));
      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Danh sách ứng viên');
      XLSX.writeFile(wb, `danh_sach_ung_vien_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.xlsx`);
    });

    renderTable();
  </script>
</body>

</html>
