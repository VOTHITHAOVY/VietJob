<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViecJob — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:       #0e0e10;
  --ink-2:     #4a4a52;
  --ink-3:     #9898a6;
  --ink-4:     #c8c8d4;
  --rule:      #ebebf0;
  --surface:   #ffffff;
  --bg:        #f7f7f9;
  --violet:    #5b21f5;
  --violet-2:  #7c4dff;
  --violet-bg: #f0ebff;
  --violet-mid:#c4b0fa;
  --green:     #16a34a;
  --green-bg:  #dcfce7;
  --amber:     #b45309;
  --amber-bg:  #fef3c7;
  --red:       #dc2626;
  --red-bg:    #fee2e2;
  --blue:      #1d4ed8;
  --blue-bg:   #dbeafe;
  --r:         8px;
  --r-lg:      12px;
  --fs-xs:     11px;
  --fs-sm:     12.5px;
  --fs-base:   13.5px;
  --fs-md:     15px;
  --fs-lg:     18px;
  --fs-xl:     24px;
  --fs-2xl:    32px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:var(--fs-base);line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;height:100vh;overflow:hidden;}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--rule);display:flex;flex-direction:column;padding:0;height:100vh;overflow-y:auto;position:fixed;left:0;top:0;z-index:50;}
.sb-logo{padding:20px 18px 12px;border-bottom:1px solid var(--rule);}
.sb-logo-mark{display:flex;align-items:center;gap:9px;}
.sb-brand{font-size:14px;font-weight:900;letter-spacing:2px;color:var(--ink);}
.sb-brand span{color:var(--violet);}
.sb-section{padding:16px 10px 4px;font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);}
.sb-nav{list-style:none;padding:0 8px;}
.sb-nav li{margin-bottom:1px;}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);font-size:var(--fs-sm);font-weight:400;color:var(--ink-2);text-decoration:none;transition:background .12s,color .12s;cursor:pointer;}
.sb-link:hover{background:var(--bg);color:var(--ink);}
.sb-link.active{background:var(--violet-bg);color:var(--violet);font-weight:500;}
.sb-link svg{width:16px;height:16px;flex-shrink:0;stroke-width:1.8;opacity:.7;}
.sb-link.active svg{opacity:1;}
.sb-bottom{margin-top:auto;border-top:1px solid var(--rule);padding:14px 16px;}
.sb-user{display:flex;align-items:center;gap:10px;}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--violet);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;}
.sb-user-name{font-size:var(--fs-sm);font-weight:500;color:var(--ink);}
.sb-user-role{font-size:10px;color:var(--ink-3);}

/* Main */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:var(--ink-3);}
.topbar-left .crumb-active{color:var(--ink);font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:10px;}
/* NÚT HỒ SƠ CÁ NHÂN */
.profile-btn{
  display:flex;
  align-items:center;
  gap:8px;
  background:transparent;
  border:none;
  cursor:pointer;
  padding:5px 10px;
  border-radius:40px;
  transition:all 0.2s;
  font-family:inherit;
}
.profile-btn:hover{
  background:var(--bg);
}
.profile-btn .avatar{
  width:30px;
  height:30px;
  border-radius:50%;
  background:var(--violet);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:600;
  color:#fff;
}
.profile-btn .name{
  font-size:13px;
  color:var(--ink-2);
  font-weight:500;
}
.canvas{flex:1;overflow-y:auto;padding:0;background:var(--bg);}
iframe{width:100%;height:100%;border:none;background:transparent;}
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">
      <svg width="38" height="38" viewBox="0 0 100 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="52" cy="80" rx="38" ry="50" fill="#7C3AED" transform="rotate(-10, 52, 80)"/>
        <path d="M 20 110 Q 5 130 0 145 Q 18 128 35 120 Z" fill="#7C3AED"/>
        <path d="M 52 70 Q 85 55 95 65 Q 78 72 60 80 Z" fill="#7C3AED"/>
        <path d="M 55 72 Q 82 60 90 67 Q 74 72 60 78 Z" fill="#5B21B6"/>
        <circle cx="60" cy="42" r="22" fill="#7C3AED"/>
        <path d="M 78 40 L 94 36 L 80 46 Z" fill="#7C3AED"/>
        <path d="M 79 39 L 91 36 L 80 43 Z" fill="#5B21B6"/>
        <circle cx="66" cy="38" r="8" fill="white"/>
        <circle cx="68" cy="38" r="5" fill="#7C3AED"/>
        <circle cx="70" cy="36" r="1.5" fill="white"/>
        <ellipse cx="44" cy="88" rx="18" ry="26" fill="white" opacity="0.92"/>
        <path d="M 32 105 Q 44 118 58 108 Q 50 125 35 120 Z" fill="white" opacity="0.7"/>
      </svg>
      <div>
        <div class="sb-brand">VIEC<span>JOB</span></div>
      </div>
    </div>
  </div>

  <div class="sb-section">Chính</div>
  <ul class="sb-nav">
    <li><a class="sb-link" data-page="Tongquan.html" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Tổng quan
    </a></li>
    <li><a class="sb-link" data-page="Nguoidung.html" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Quản lý Người dùng
    </a></li>
    <li><a class="sb-link" data-page="Tintuyendung.html" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Tin tuyển dụng
    </a></li>
    <li><a class="sb-link" data-page="QuanlyCV.html" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16v16H4z" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="12" y2="13"/></svg>
      Quản lý CV
    </a></li>
    <li><a class="sb-link" data-page="QuanlyNhatuyendung.html" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Quản lý Nhà tuyển dụng
    </a></li>
  </ul>

  <div class="sb-section">Quản trị</div>
  <ul class="sb-nav">
    <li><a class="sb-link" data-page="Goidichvu.html" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Gói Dịch vụ
    </a></li>
    <li><a class="sb-link" data-page="Kiemduyet.html" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Kiểm duyệt
    </a></li>
    <li><a class="sb-link" data-page="Phantich.html" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Phân tích
    </a></li>
    <li><a class="sb-link" id="settingsMenu" href="Caidat.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Cài đặt
    </a></li>
  </ul>

  <div class="sb-bottom">
    <div class="sb-user">
      <div class="sb-avatar">A</div>
      <div>
        <div class="sb-user-name">Admin</div>
        <div class="sb-user-role">Super admin</div>
      </div>
    </div>
  </div>
</nav>

<!-- Main content - nơi load các trang -->
<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <span>ViecJob</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span class="crumb-active" id="pageTitle">Tổng quan</span>
    </div>
    <div class="topbar-right">
      <button class="profile-btn" id="profileBtn">
        <div class="avatar">A</div>
        <span class="name">Admin</span>
      </button>
    </div>
  </header>

  <main class="canvas" id="dynamicContent">
    <iframe src="Tongquan.html" id="contentFrame" style="width:100%; height:100%; border:none;"></iframe>
  </main>
</div>

<script>
  const frame = document.getElementById('contentFrame');
  const titleSpan = document.getElementById('pageTitle');

  const menuTitles = {
    'Tongquan.html': 'Tổng quan',
    'Nguoidung.html': 'Quản lý Người dùng',
    'Tintuyendung.html': 'Tin tuyển dụng',
    'QuanlyCV.html': 'Quản lý CV',
    'QuanlyNhatuyendung.html': 'Quản lý Nhà tuyển dụng',
    'Goidichvu.html': 'Gói Dịch vụ',
    'Kiemduyet.html': 'Kiểm duyệt',
    'Phantich.html': 'Phân tích'
  };

  function loadPage(page) {
    titleSpan.innerText = menuTitles[page] || 'Quản trị';
    frame.src = page;
  }

  // Gắn sự kiện click cho sidebar (trừ Cài đặt)
  document.querySelectorAll('.sb-link').forEach(link => {
    const href = link.getAttribute('href');
    if (href && href !== '#') {
      return;
    }
    
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const page = link.getAttribute('data-page');
      if (page) {
        loadPage(page);
        document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      }
    });
  });

  // NÚT HỒ SƠ CÁ NHÂN - CHUYỂN SANG Trangcanhan.html
  const profileBtn = document.getElementById('profileBtn');
  if (profileBtn) {
    profileBtn.addEventListener('click', function() {
      window.location.href = 'Trangcanhan.html';
    });
  }

  // Mặc định load trang tổng quan
  loadPage('Tongquan.html');
</script>
</body>
</html>
