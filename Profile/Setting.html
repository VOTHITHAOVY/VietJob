<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VietJob - Cài đặt tài khoản</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <!-- Dùng chung profile.css (đã có navbar, footer, dropdown) -->
  <link rel="stylesheet" href="Css/profile.css">
  <style>
    /* ========== STYLE RIÊNG CHO TRANG CÀI ĐẶT ========== */
    .settings-container {
      max-width: 1280px;
      margin: 88px auto 48px;
      padding: 0 28px;
    }
    .settings-header {
      margin-bottom: 32px;
    }
    .settings-header h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--gray-900);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .settings-header p {
      font-size: 14px;
      color: var(--gray-500);
    }
    .settings-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      background: white;
      border-radius: 20px;
      border: 1px solid #EBEBEB;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .settings-sidebar {
      background: #F9FAFB;
      border-right: 1px solid #EBEBEB;
      padding: 24px 0;
    }
    .settings-category {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .settings-category i {
      font-size: 18px;
      color: var(--gray-500);
    }
    .settings-category:hover {
      background: var(--purple-100);
      color: var(--purple);
    }
    .settings-category.active {
      background: var(--purple-100);
      color: var(--purple);
      border-left-color: var(--purple);
      font-weight: 700;
    }
    .settings-content {
      padding: 32px;
      background: white;
    }
    .setting-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .setting-section.active {
      display: block;
    }
    .setting-section h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--purple-100);
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--gray-700);
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #EBEBEB;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .toggle-switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #F3F4F6;
    }
    .toggle-switch:last-child { border-bottom: none; }
    .toggle-label { font-weight: 500; color: var(--gray-700); }
    .toggle-desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--purple); }
    input:checked + .slider:before { transform: translateX(24px); }
    .social-link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid #EBEBEB;
      border-radius: 12px;
      background: #FAFAFA;
    }
    .social-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--purple-100);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .social-icon i { font-size: 22px; color: var(--purple); }
    .social-input { flex: 1; }
    .social-input input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #EBEBEB;
      border-radius: 8px;
    }
    .social-status { font-size: 12px; font-weight: 600; color: var(--green); }
    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #EBEBEB;
    }
    .btn-cancel, .btn-save {
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .btn-cancel {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid #EBEBEB;
    }
    .btn-cancel:hover { background: var(--gray-200); transform: translateY(-1px); }
    .btn-save {
      background: var(--purple);
      color: white;
      box-shadow: var(--shadow-purple);
    }
    .btn-save:hover { background: var(--purple-dark); transform: translateY(-1px); }
    .loading { text-align: center; padding: 60px; color: var(--gray-500); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 768px) {
      .settings-grid { grid-template-columns: 1fr; }
      .settings-sidebar { border-right: none; border-bottom: 1px solid #EBEBEB; display: flex; overflow-x: auto; padding: 12px; }
      .settings-category { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
      .settings-category.active { border-bottom-color: var(--purple); }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="settings-container">
  <div class="settings-header">
    <h1>Cài đặt tài khoản</h1>
    <p>Quản lý thông tin cá nhân, bảo mật và tùy chỉnh trải nghiệm của bạn.</p>
  </div>

  <div class="settings-grid">
    <div class="settings-sidebar">
      <div class="settings-category active" data-category="profile"><i class="ti ti-user"></i> Thông tin cá nhân</div>
      <div class="settings-category" data-category="security"><i class="ti ti-lock"></i> Bảo mật</div>
      <div class="settings-category" data-category="privacy"><i class="ti ti-shield"></i> Quyền riêng tư</div>
      <div class="settings-category" data-category="notifications"><i class="ti ti-bell"></i> Thông báo</div>
      <div class="settings-category" data-category="appearance"><i class="ti ti-palette"></i> Giao diện</div>
      <div class="settings-category" data-category="social"><i class="ti ti-brand-github"></i> Liên kết mạng xã hội</div>
    </div>

    <div class="settings-content" id="settings-content">
      <div class="loading">Đang tải...</div>
    </div>
  </div>

  <div class="settings-actions">
    <button class="btn-cancel" id="cancel-settings">Hủy</button>
    <button class="btn-save" id="save-settings">Lưu thay đổi</button>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="../Component/loader.js"></script>
<script src="Js/Setting.js"></script>
</body>
</html>
