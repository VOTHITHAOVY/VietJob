<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VietJob - Hồ sơ của tôi</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="css/Profile.css">
</head>

<body>

  <!-- ========== HEADER (GIỐNG INDEX) ========== -->
  <div id="header-placeholder"></div>

  <!-- ========== MAIN: 2 CỘT ========== -->
  <main class="profile-main">
    <div class="profile-container">
      <!-- Cột trái: Menu + ảnh đại diện -->
      <aside class="profile-sidebar">
        <div class="user-info">
          <div class="user-avatar-large" id="sidebar-avatar">?</div>
          <div class="user-name-large" id="sidebar-name">Người dùng</div>
          <div class="user-email" id="sidebar-email">email@example.com</div>
        </div>
        <div class="sidebar-menu">
          <div class="menu-group">
            <div class="menu-group-title">QUẢN LÝ TÌM VIỆC</div>
            <ul>
              <li data-page="dashboard" class="active">
                <i class="ti ti-dashboard"></i> Bảng điều khiển
              </li>
              <li data-page="saved-jobs">
                <i class="ti ti-bookmark"></i> Việc làm đã lưu
              </li>
              <li data-page="applied-jobs">
                <i class="ti ti-send"></i> Việc làm đã ứng tuyển
              </li>
            </ul>
          </div>

          <!-- GROUP QUẢN LÝ CV - đã bao gồm nút Đăng xuất ở cuối -->
          <div class="menu-group last-group">
            <div class="menu-group-title">QUẢN LÝ CV</div>
            <ul>
              <li data-page="manage-cv">
                <i class="ti ti-file-text"></i> Quản lý CV
              </li>
              <li data-page="employer-views">
                <i class="ti ti-eye"></i> NTD xem hồ sơ
              </li>
            </ul>
            <!-- Nút đăng xuất nằm ngay bên dưới danh sách, trong cùng group -->
            <button id="logout-sidebar" class="logout-btn">
              <i class="ti ti-logout"></i> Đăng xuất
            </button>
          </div>
        </div>
      </aside>

      <!-- Cột phải: Nội dung động -->
      <section class="profile-content">
        <div id="content-area">
          <div class="placeholder-message">
            <span class="mat-icon">hourglass_empty</span>
            <p>Đang tải...</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- ========== FOOTER (GIỐNG INDEX) ========== -->
  <div id="footer-placeholder"></div>

  <script src="Js/Profile.js"></script>
  <script src="../../Component/loader.js"></script>
</body>

</html>
